server {
    listen 80;
    server_name converted-files.cubinez.ru;

    # Basic Auth для API
    auth_basic "Restricted File Converter";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Таймауты
    proxy_read_timeout 300s;
    client_max_body_size 200M;

    # Прокси к Django
    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 👇 СТАТИКА И МЕДИА - БЕЗ AUTH!
    location /static/ {
        alias /home/cubinez85/converted_files/staticfiles/;
        auth_basic off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/cubinez85/converted_files/media/;
        auth_basic off;  # 👈 Обязательно отключаем auth для медиа!
        
        # Разрешаем скачивание файлов
        types {
            application/pdf pdf;
            application/vnd.openxmlformats-officedocument.wordprocessingml.document docx;
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx;
            text/csv csv;
            application/json json;
        }
        add_header Content-Disposition "attachment";
    }
}
